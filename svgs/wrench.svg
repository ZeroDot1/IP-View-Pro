<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="wrench-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C0C0C8"/>
      <stop offset="50%" stop-color="#8E8E98"/>
      <stop offset="100%" stop-color="#6E6E78"/>
    </linearGradient>
    <filter id="wrench-shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>
  <!-- Wrench - jaw -->
  <path d="M12 30 L12 16 C12 12 16 8 20 8 L26 8 C30 8 34 12 34 16 L34 22 L58 46 C60 44 62 42 64 42 L76 42 C80 42 84 46 84 50 L84 58 C84 62 80 66 76 66 L68 66 C64 66 60 62 60 58 L32 30 Z"
