  <rect x="38" y="48" width="12" height="44" rx="4" fill="url(#wrench-body)" filter="url(#wrench-shadow)"/>
  <!-- Jaw opening -->
  <rect x="18" y="18" width="12" height="12" rx="2" fill="#2A2A34" opacity="0.6"/>
  <!-- Highlight -->
  <rect x="40" y="50" width="4" height="30" rx="2" fill="rgba(255,255,255,0.3)"/>
  <path d="M22 12 L20 22" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
