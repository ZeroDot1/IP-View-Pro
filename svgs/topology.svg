  <!-- Connecting lines -->
  <line x1="220" y1="145" x2="140" y2="298" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="260" y1="158" x2="256" y2="388" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
