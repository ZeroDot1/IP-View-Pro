      <stop offset="0%" stop-color="#66AAFF"/>
      <stop offset="50%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </radialGradient>
    <filter id="info-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,85,204,0.4)"/>
