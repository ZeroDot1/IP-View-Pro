<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="40%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#E6A800"/>
    </linearGradient>
    <filter id="bolt-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="rgba(200,150,0,0.5)"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Leuchtender Blitz -->
  <path d="M56 8 L22 54 L44 54 L38 92 L78 42 L54 42 L62 8 Z"
        fill="url(#bolt-grad)" filter="url(#bolt-effect)"/>
  <!-- Highlight -->
  <path d="M52 14 L26 50 L44 50 L40 80" fill="none"
        stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Kleiner Glanzpunkt -->
  <ellipse cx="48" cy="20" rx="6" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-30,48,20)"/>
</svg>